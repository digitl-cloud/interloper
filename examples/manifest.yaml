# Declarative run manifest — materialize a DAG without writing Python.
#
#   interloper run -f examples/manifest.yaml --dry-run   # validate + print the plan
#   interloper run -f examples/manifest.yaml             # materialize
#
# Component `type` references are catalog keys (resolved against the
# `catalog` list of interloper.yaml) or fully qualified import paths.
# `${VAR}` placeholders are interpolated from the environment at load time.
# The `runner` block overrides the one from interloper.yaml; the CLI
# `--date/--start-date/--end-date` flags override the `partition` block.

name: demo-manifest

runner:
  type: serial

destination:
  type: interloper.destination.file.FileDestination
  config:
    base_path: /tmp/interloper-demo

assets:
  - source: interloper_assets.demo.source.DemoSource
    config:
      hello: manifest
    select: [a, b] # subset of the a -> b,c,d -> e DAG; omit to run all assets

partition:
  date: 2026-01-01

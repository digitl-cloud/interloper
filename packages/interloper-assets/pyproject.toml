# ###############
# PROJECT / UV
# ###############
[project]
name = "interloper-assets"
version = "0.14.0"
description = "Interloper Assets"
readme = "README.md"
authors = [{ name = "Guillaume Onfroy", email = "guillaume@digitlcloud.com" }]
requires-python = ">=3.10"
dependencies = ["interloper-core", "interloper-pandas", "httpx>=0.28.1", "tenacity>=9.1.4"]

[project.optional-dependencies]
bing = ["bingads>=13.0.24.1"]
google = ["google-api-python-client>=2.167.0", "google-ads>=29.2.0"]
facebook = ["facebook-business>=20.0.0"]

[project.entry-points."interloper.components"]
assets = "interloper_assets"

[build-system]
requires = ["uv_build>=0.11.5,<0.12"]
build-backend = "uv_build"

[tool.uv.sources]
interloper-core = { workspace = true }
interloper-pandas = { workspace = true }

# ###############
# RUFF
# ###############
[tool.ruff]
line-length = 120

[tool.ruff.lint]
extend-select = ["E", "I", "UP", "ANN001", "ANN201", "ANN202"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"**/schemas/**" = ["E501"]
"tests/**" = ["ANN", "F811"]

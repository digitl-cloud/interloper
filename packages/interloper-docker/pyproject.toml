# ###############
# PROJECT / UV
# ###############
[project]
name = "interloper-docker"
version = "0.40.0"
description = "Interloper Docker integration"
readme = "README.md"
authors = [{ name = "Guillaume Onfroy", email = "guillaume@digitlcloud.com" }]
requires-python = ">=3.10"
dependencies = ["docker>=7.1.0", "interloper-core", "interloper-scheduler"]

[project.entry-points."interloper.runners"]
docker = "interloper_docker.runner:DockerRunner"

[project.entry-points."interloper.launchers"]
docker = "interloper_docker.launcher:DockerLauncher"

[build-system]
requires = ["uv_build>=0.11.5,<0.12"]
build-backend = "uv_build"

[tool.uv.sources]
interloper-core = { workspace = true }
interloper-scheduler = { workspace = true }

# ###############
# RUFF
# ###############
[tool.ruff]
line-length = 120

[tool.ruff.lint]
extend-select = ["E", "I", "UP", "ANN001", "ANN201", "ANN202"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"tests/**" = ["ANN", "F811"]

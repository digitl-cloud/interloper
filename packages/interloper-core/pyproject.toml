# ###############
# PROJECT / UV
# ###############
[project]
name = "interloper-core"
version = "0.30.1"
description = "Interloper"
authors = [{ name = "Guillaume Onfroy", email = "guillaume@digitlcloud.com" }]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.11.7",
    "pydantic-settings>=2.11.0",
    "httpx>=0.28.1",
    "pyyaml>=6.0.0",
    "typing_extensions>=4.0.0",
]

[project.optional-dependencies]
google-cloud = ["interloper-google-cloud"]

[dependency-groups]
dev = ["pytest>=8.0.0", "pytest-cov>=7.0.0"]

[tool.uv.sources]
interloper-google-cloud = { workspace = true }

[project.entry-points."interloper.runners"]
async = "interloper.runner.async_runner:AsyncRunner"
serial = "interloper.runner.serial:SerialRunner"
multi_process = "interloper.runner.multi_process:MultiProcessRunner"

[project.entry-points."interloper.oauth_providers"]
amazon = "interloper.oauth.builtin:AMAZON"
criteo = "interloper.oauth.builtin:CRITEO"
facebook = "interloper.oauth.builtin:FACEBOOK"
google = "interloper.oauth.builtin:GOOGLE"
linkedin = "interloper.oauth.builtin:LINKEDIN"
microsoft = "interloper.oauth.builtin:MICROSOFT"
pinterest = "interloper.oauth.builtin:PINTEREST"
snapchat = "interloper.oauth.builtin:SNAPCHAT"
tiktok = "interloper.oauth.builtin:TIKTOK"

[build-system]
requires = ["uv_build>=0.11.5,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "interloper"

[project.scripts]
interloper = "interloper.cli.main:main"

# ###############
# RUFF
# ###############
[tool.ruff]
line-length = 120

[tool.ruff.lint]
preview = true
extend-select = ["E", "I", "UP", "ANN001", "ANN201", "ANN202", "DOC", "D"]
ignore = ["D104"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"tests/**" = ["ANN", "D101", "D102", "B018"]

# ###############
# PYTEST
# ###############
[tool.pytest.ini_options]
filterwarnings = ["ignore::DeprecationWarning"]
asyncio_mode = "auto"

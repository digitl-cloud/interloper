# ###############
# PROJECT / UV
# ###############
[project]
name = "interloper-agent"
version = "0.23.0"
description = "Interloper AI agent powered by Google ADK"
readme = "README.md"
authors = [{ name = "Guillaume Onfroy", email = "guillaume@digitlcloud.com" }]
requires-python = ">=3.10"
dependencies = [
    "interloper-core",
    "interloper-db",
    "interloper-assets",
    "google-adk>=1.0.0",
]

[build-system]
requires = ["uv_build>=0.11.5,<0.12"]
build-backend = "uv_build"

[tool.uv.sources]
interloper-core = { workspace = true }
interloper-db = { workspace = true }
interloper-assets = { workspace = true }

# ###############
# RUFF
# ###############
[tool.ruff]
line-length = 120

[tool.ruff.lint]
extend-select = ["E", "I", "UP", "ANN001", "ANN201", "ANN202"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"tests/**" = ["ANN", "F811"]

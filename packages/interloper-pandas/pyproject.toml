# ###############
# PROJECT / UV
# ###############
[project]
name = "interloper-pandas"
version = "0.11.0"
description = "Interloper pandas integration: DataFrame normalizer and adapter"
readme = "README.md"
authors = [{ name = "Guillaume Onfroy", email = "guillaume@digitlcloud.com" }]
requires-python = ">=3.10"
dependencies = ["interloper-core", "pandas>=1.5"]

[project.entry-points."interloper.representations"]
dataframe = "interloper_pandas.representation:DATAFRAME_REPRESENTATION"

[build-system]
requires = ["uv_build>=0.11.5,<0.12"]
build-backend = "uv_build"

[tool.uv.sources]
interloper-core = { workspace = true }

# ###############
# RUFF
# ###############
[tool.ruff]
line-length = 120

[tool.ruff.lint]
extend-select = ["E", "I", "UP", "ANN001", "ANN201", "ANN202"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"tests/**" = ["ANN", "F811"]

# ###############
# PROJECT / UV
# ###############
[project]
name = "interloper-k8s"
version = "0.31.0"
description = "Interloper Kubernetes integration"
readme = "README.md"
authors = [{ name = "Guillaume Onfroy", email = "guillaume@digitlcloud.com" }]
requires-python = ">=3.10"
dependencies = [
    "kubernetes>=31.0.0",
    "interloper-core",
    "interloper-scheduler",
]

[project.entry-points."interloper.runners"]
kubernetes = "interloper_k8s.runner:KubernetesRunner"
# Deprecated alias — pre-existing configs use runner.type=k8s; the canonical
# key matches the launcher ("kubernetes").
k8s = "interloper_k8s.runner:KubernetesRunner"

[project.entry-points."interloper.launchers"]
kubernetes = "interloper_k8s.launcher:KubernetesLauncher"

[build-system]
requires = ["uv_build>=0.11.5,<0.12"]
build-backend = "uv_build"

[tool.uv.sources]
interloper-core = { workspace = true }
interloper-scheduler = { workspace = true }

# ###############
# RUFF
# ###############
[tool.ruff]
line-length = 120

[tool.ruff.lint]
extend-select = ["E", "I", "UP", "ANN001", "ANN201", "ANN202"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"tests/**" = ["ANN", "F811"]

# ###############
# PROJECT / UV
# ###############
[project]
name = "interloper-google-cloud"
version = "0.39.0"
description = "Interloper Google Cloud integration: BigQuery and Cloud Storage destinations"
readme = "README.md"
authors = [{ name = "Guillaume Onfroy", email = "guillaume@digitlcloud.com" }]
requires-python = ">=3.10"
dependencies = [
    "google-cloud-bigquery>=3.0",
    "google-cloud-storage>=2.0",
    "interloper-core",
    "interloper-pandas",
    "pyarrow>=14",
    "db-dtypes>=1.0",
]

[project.entry-points."interloper.components"]
google_cloud = "interloper_google_cloud"

[build-system]
requires = ["uv_build>=0.11.5,<0.12"]
build-backend = "uv_build"

[tool.uv.sources]
interloper-core = { workspace = true }
interloper-pandas = { workspace = true }

# ###############
# RUFF
# ###############
[tool.ruff]
line-length = 120

[tool.ruff.lint]
extend-select = ["E", "I", "UP", "ANN001", "ANN201", "ANN202"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"tests/**" = ["ANN", "F811"]

postgres:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  database: interloper

server:
  host: 0.0.0.0
  port: 3000

cron:
  reconcile_interval: 10

worker:
  poll_interval: 5

launcher:
  # type: in_process

  # type: docker
  # config:
  #   image: interloper-scheduler-docker:latest
  #   postgres_host: host.docker.internal

  type: kubernetes
  config:
    image: interloper-scheduler-k8s:latest
    namespace: interloper
    image_pull_policy: Never

runner:
  # type: docker
  # config:
  #   image: interloper-scheduler-docker:latest
  #   auto_remove: false
  #   image_pull_policy: Never

  type: kubernetes
  config:
    image: interloper-scheduler-k8s:latest
    namespace: interloper


name: Checks

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/workflows/docs.yaml"
      - ".github/workflows/release.yaml"
      - ".github/workflows/lint_pr.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: UV setup
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false
          python-version: ${{ matrix.python-version }}
          cache-suffix: "py${{ matrix.python-version }}"

      - name: UV sync
        run: uv sync --all-packages --all-extras

      - name: Ruff
        run: uv run ruff check packages

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: uv run pytest --cov --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: packages/interloper-app/app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Version is read from package.json#packageManager.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: packages/interloper-app/app/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm exec nuxt typecheck

  docker:
    name: Docker smoke (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Light smoke set: `core` exercises the Python build path;
        # `frontend` exercises the Node/Nuxt build path. Full matrix
        # (worker/scheduler/api + launcher variants) runs on release.
        target: [core, frontend]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (${{ matrix.target }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: false
          load: false
          cache-from: type=gha,scope=docker-${{ matrix.target }}
          cache-to: type=gha,scope=docker-${{ matrix.target }},mode=max

  helm:
    name: Helm lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint
        run: helm lint chart/interloper

      - name: Template
        run: helm template chart/interloper > /dev/null

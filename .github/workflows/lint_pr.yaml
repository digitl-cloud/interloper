name: Lint PR

on:
  pull_request:

permissions:
  pull-requests: read
  statuses: write

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          scopes: |
            agent
            api
            app
            assets
            chart
            ci
            core
            db
            deps
            docker
            docs
            google-cloud
            k8s
            pandas
            scheduler
          requireScope: false

# =============================================================================
# Interloper Helm chart — default values
# =============================================================================

# Global image defaults (overridable per-component below).
#
# Images are published to GitHub Container Registry and follow the
# convention "<registry>/interloper-<component>:<tag>" — e.g.
# ghcr.io/digitl-cloud/interloper-api:0.3.1. Flavored variants ride the TAG as
# a "-<flavor>" suffix on the same image: the scheduler gets "-k8s"/"-docker"
# from config.launcher.type, and the api gets "-agent" when agent.enabled.
image:
  registry: ghcr.io/digitl-cloud
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent
  pullSecrets: []
  # - name: my-registry-secret

# =============================================================================
# Components
# =============================================================================

# ── Scheduler (cron + worker + reaper; singleton) ──────────────────────────
# Runs cron reconciler, the queue worker, and the reaper in one process.
# replicaCount must stay at 1 — cron + reaper are singletons.
scheduler:
  enabled: true
  replicaCount: 1
  image:
    repository: ""  # defaults to {image.registry}/interloper-scheduler
    tag: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  extraEnv: []
  # Extra `envFrom` sources (secretRef / configMapRef) injected verbatim. Use
  # this to bulk-map a Secret whose keys already match the desired env var
  # names (e.g. connector OAuth provider creds) instead of one entry per key.
  extraEnvFrom: []

# ── Worker (per-asset Job target; only consumed when config.runner.type=kubernetes (or legacy alias k8s)) ─
# Not deployed as a workload — this image is referenced by the Kubernetes
# runner as the per-asset Job target. Slimmer than scheduler: no DB, no
# scheduler/launcher packages, just core + assets + destinations + pandas.
worker:
  image:
    repository: ""  # defaults to {image.registry}/interloper-worker
    tag: ""

# ── API (REST + websocket backend) ─────────────────────────────────────────
api:
  enabled: true
  replicaCount: 1
  image:
    repository: ""  # defaults to {image.registry}/interloper-api
    tag: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  service:
    type: ClusterIP
    port: 3000
  # IPs uvicorn trusts for X-Forwarded-* headers. The API runs behind the
  # chart's ingress/HTTPRoute (TLS terminated upstream), so it must trust the
  # proxy to emit correct https redirects (e.g. the /api/catalog -> /api/catalog/
  # 307). Defaults to "*"; set to "" to disable, or a comma-separated IP list.
  forwardedAllowIps: "*"
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  extraEnv: []
  # Extra `envFrom` sources (secretRef / configMapRef) injected verbatim. Use
  # this to bulk-map a Secret whose keys already match the desired env var
  # names (e.g. connector OAuth provider creds) instead of one entry per key.
  extraEnvFrom: []

# ── Frontend (nginx serving the pre-built Nuxt SPA) ────────────────────────
frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: ""  # defaults to {image.registry}/interloper-frontend
    tag: ""
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      memory: 64Mi
  service:
    type: ClusterIP
    port: 80
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ── DB init Job (schema bootstrap; runs once per release) ──────────────────
dbInit:
  enabled: true
  backoffLimit: 6
  ttlSecondsAfterFinished: 300
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

# =============================================================================
# Configuration
# =============================================================================

# Agent (ADK chat) support. When enabled, the chart deploys the
# `interloper-api:<tag>-agent` image, which bundles interloper-agent, and
# enables the /agent routes via the generated interloper.yaml (the API
# reports availability to the app, which shows/hides the Agent UI).
#
# `model` takes a bare name for native Gemini models (default
# "gemini-2.5-flash") or a LiteLLM `provider/model` reference such as
# "anthropic/claude-sonnet-4-5" or "openai/gpt-5". Credentials come from the
# provider's standard env vars supplied via api.extraEnv / api.extraEnvFrom
# (e.g. GOOGLE_API_KEY, ANTHROPIC_API_KEY, OPENAI_API_KEY). For Gemini on
# GKE, Vertex AI needs no key at all: set GOOGLE_GENAI_USE_VERTEXAI=TRUE,
# GOOGLE_CLOUD_PROJECT, and GOOGLE_CLOUD_LOCATION and grant the pod's
# service account Vertex access via workload identity.
agent:
  enabled: false
  model: ""  # defaults to gemini-2.5-flash

# The chart generates an interloper.yaml ConfigMap from this block.
# Any value set here becomes part of the config file mounted into the pods.
config:
  server:
    host: "0.0.0.0"
    port: 3000

  cron:
    reconcile_interval: 10

  worker:
    poll_interval: 5

  # Reaper: kills timed-out runs (singleton, paired with cron).
  reaper:
    timeout: 3600
    poll_interval: 10

  # How runs are launched (where they execute).
  launcher:
    type: kubernetes
    config:
      image: ""  # defaults to scheduler image (set automatically if empty)
      namespace: ""  # defaults to release namespace
      # service_account_name: "{{ .Release.Name }}-launcher"  # auto-filled if rbac.create
      # image_pull_policy: IfNotPresent
      # resources:
      #   requests: {cpu: "100m", memory: "256Mi"}
      #   limits: {memory: "512Mi"}

  # How the DAG runs inside each launched container.
  runner:
    type: async
    config: {}

  # Catalog: list of dotted import paths for sources, assets, destinations.
  catalog: []
  # - interloper_assets.demo.source.DemoSource
  # - interloper_google_cloud.BigQueryDestination

  # SMTP config for sending emails (password via secrets.smtpPassword)
  smtp: {}
  # smtp:
  #   host: smtp.gmail.com
  #   port: 465
  #   user: "no-reply@example.com"

  # Auth config (OAuth client ID)
  auth: {}
  # auth:
  #   google_client_id: "..."

# =============================================================================
# Secrets
# =============================================================================

# Sensitive values.  Either set them inline (dev) or reference an existing
# Secret via `existingSecret`.
secrets:
  # If set, the chart does NOT create a Secret and reads credentials from
  # the named existing Secret.  It must contain the keys referenced below.
  existingSecret: ""

  # Inline values (only used when existingSecret is empty).
  # Required keys:
  #   - INTERLOPER_POSTGRES_PASSWORD
  #   - INTERLOPER_ENCRYPTION_KEY (used to encrypt resource secrets at rest)
  # Optional:
  #   - INTERLOPER_SMTP_PASSWORD
  postgresPassword: "postgres"
  encryptionKey: ""  # recommended to generate: openssl rand -base64 32
  smtpPassword: ""
  googleClientSecret: ""  # OAuth client secret (paired with config.auth.google_client_id)

# =============================================================================
# Postgres
# =============================================================================

# Bundled Postgres for local/dev use only.  Single replica, no HA, no
# backup tooling — production should use an external managed Postgres
# (set postgresql.enabled=false and provide externalPostgres.*).
postgresql:
  enabled: false
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: interloper
    database: interloper
    # Password is read from secrets.postgresPassword (or secrets.existingSecret).
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""  # use cluster default
  resources: {}

# External Postgres.  Used when postgresql.enabled=false.
externalPostgres:
  host: ""
  port: 5432
  user: interloper
  database: interloper
  # Password comes from secrets.postgresPassword or secrets.existingSecret.

# =============================================================================
# Ingress / Gateway
# =============================================================================

# Standard Kubernetes Ingress (nginx, ALB, GKE, etc.)
ingress:
  enabled: false
  className: ""
  annotations: {}
    # nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  host: interloper.local
  tls:
    enabled: false
    secretName: ""
  # The chart routes /api/* to the API service and everything else to the
  # frontend service.
  apiPath: /api
  apiPathType: Prefix
  rootPath: /
  rootPathType: Prefix

# Gateway API HTTPRoute (gateway.networking.k8s.io/v1).  Mutually compatible
# with the Ingress above — enable whichever your cluster uses.
httpRoute:
  enabled: false
  parentRefs: []
    # - name: my-gateway
    #   namespace: gateway-system
  hostnames:
    - interloper.local
  apiPath: /api
  rootPath: /

# =============================================================================
# RBAC (required by the Kubernetes launcher)
# =============================================================================

rbac:
  create: true
  # Grants the scheduler's ServiceAccount permissions to manage Jobs + read
  # Pods/logs in the release namespace, which is what the K8s launcher
  # needs to dispatch per-run Jobs.

serviceAccount:
  # When rbac.create is true, a ServiceAccount is created with this name
  # and bound to the Role.  If unset, defaults to "{{ .Release.Name }}-scheduler".
  name: ""
  # Annotations added to the ServiceAccount.  Use for cloud IAM bindings such
  # as GKE Workload Identity:
  #   annotations:
  #     iam.gke.io/gcp-service-account: my-sa@my-project.iam.gserviceaccount.com
  annotations: {}

# =============================================================================
# Pod defaults
# =============================================================================

podSecurityContext: {}
  # runAsNonRoot: true
  # runAsUser: 1000

securityContext: {}
  # readOnlyRootFilesystem: true
  # allowPrivilegeEscalation: false

commonLabels: {}
commonAnnotations: {}

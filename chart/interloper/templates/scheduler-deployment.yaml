{{- if .Values.scheduler.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "interloper.fullname" . }}-scheduler
  labels:
    {{- include "interloper.componentLabels" (dict "root" . "component" "scheduler") | nindent 4 }}
spec:
  replicas: {{ .Values.scheduler.replicaCount }}
  strategy:
    type: Recreate  # cron + queue must not overlap
  selector:
    matchLabels:
      {{- include "interloper.selectorLabels" (dict "root" . "component" "scheduler") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "interloper.selectorLabels" (dict "root" . "component" "scheduler") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.scheduler.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "interloper.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: scheduler
          image: {{ include "interloper.image" (dict "root" . "component" "scheduler" "image" .Values.scheduler.image "flavor" (include "interloper.schedulerFlavor" .)) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["interloper"]
          # Singleton: cron reconciler + queue worker + reaper run together.
          # replicaCount must stay at 1 (cron + reaper are singletons).
          args:
            - app
            - --no-api
            - --cron
            - --worker
            - --reaper
            - --no-create-tables
          {{- with .Values.securityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- include "interloper.commonEnv" . | nindent 12 }}
            {{- with .Values.scheduler.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/interloper
              readOnly: true
          workingDir: /etc/interloper
          resources: {{- toYaml .Values.scheduler.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "interloper.fullname" . }}-config
      {{- with .Values.scheduler.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduler.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduler.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

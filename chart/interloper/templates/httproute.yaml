{{- if .Values.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "interloper.fullname" . }}
  labels:
    {{- include "interloper.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.api.enabled }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.httpRoute.apiPath }}
      backendRefs:
        - name: {{ include "interloper.fullname" . }}-api
          port: {{ .Values.api.service.port }}
    {{- end }}
    {{- if .Values.frontend.enabled }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.httpRoute.rootPath }}
      backendRefs:
        - name: {{ include "interloper.fullname" . }}-frontend
          port: {{ .Values.frontend.service.port }}
    {{- end }}
{{- end }}
